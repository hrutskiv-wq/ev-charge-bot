name: CI

# Ганяє pytest на кожен push і кожен PR, щоб регресії (як-от знак балансу
# чи авторизація OCPI/Monobank) ловились до мержу, а не на проді.
# Реальна Postgres/Redis тут не потрібні: усі тести (test_balance.py,
# test_ocpi_auth.py, test_ocpi_cdr.py, test_monobank_signature.py) мокають
# з'єднання з БД і зовнішні мережеві виклики — див. PROJECT_CONTEXT.md.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        env:
          # Мінімум, потрібний лише для того, щоб модулі не падали при
          # імпорті (test_health.py тягне app.main -> app.core.loader,
          # який створює Bot()/genai.Client() ще на рівні модуля) — це
          # НЕ реальні секрети, мережевих викликів до Telegram/Gemini/CPO
          # ці тести не роблять, значення лише мають правильний формат.
          OCPI_SECRET_TOKEN: ci-placeholder-token
          BOT_TOKEN: "123456:ci-placeholder-bot-token"
          GEMINI_API_KEY: ci-placeholder-gemini-key
        run: pytest -v
