name: CI

# Ганяє pytest на кожен push і кожен PR, щоб регресії (як-от знак балансу
# чи авторизація OCPI/Monobank) ловились до мержу, а не на проді.
# Основна маса тестів мокає БД і зовнішні виклики (job `test`, без реального
# Postgres). Окремий job `live-db-tests` піднімає справжній Postgres 16 для
# інтеграційних тестів, які моки принципово не покривають
# (test_start_ocpp_transaction_live.py — регресія на writable-CTE
# StartTransaction) — див. PROJECT_CONTEXT.md.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        env:
          OCPI_SECRET_TOKEN: ci-placeholder-token
          BOT_TOKEN: "123456:ci-placeholder-bot-token"
          GEMINI_API_KEY: ci-placeholder-gemini-key
        run: pytest -v

  live-db-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ev_admin
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: ev_charge_base
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ev_admin -d ev_charge_base"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run real-Postgres integration tests
        env:
          DB_URL: postgresql://ev_admin:ci_test_password@localhost:5432/ev_charge_base
          OCPI_SECRET_TOKEN: ci-placeholder-token
          BOT_TOKEN: "123456:ci-placeholder-bot-token"
          GEMINI_API_KEY: ci-placeholder-gemini-key
        run: pytest test_start_ocpp_transaction_live.py -v
