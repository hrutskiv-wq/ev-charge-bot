[pytest]
asyncio_mode = auto
# test_db.py, test_ocpi_client.py, test_ocpi_commands.py — це старі ручні
# скрипти для перевірки проти живого mock_cpo.py/реальної БД (без жодного
# assert, лише print). pytest підхоплює їх автоматично через збіг імені
# файлу test_*.py і намагається "запустити як тест" — вони падають без
# піднятого mock_cpo.py/БД, хоча самі по собі не зламані. Виключаємо з
# автоматичного прогону; запускайте їх вручну (python test_ocpi_client.py)
# коли потрібна ручна перевірка проти живого CPO.
#
# test_ocpi.py — теж виключено: тестує НЕ реальний app/api/ocpi.py, а
# осиротілий файл ocpi_emsp_cdrs_refactored.py (ніде більше не імпортується
# в проєкті), який давав хибне враження, що CDR-ендпоінт покритий тестами.
# Реальне покриття receive_cdr — у test_ocpi_cdr.py. Дет.: PROJECT_CONTEXT.md.
addopts = --ignore=test_db.py --ignore=test_ocpi_client.py --ignore=test_ocpi_commands.py --ignore=test_ocpi.py
