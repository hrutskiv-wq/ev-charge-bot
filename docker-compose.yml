version: '3.8'

# ВАЖЛИВО: усі секрети (паролі, токени) тепер задаються лише через .env і
# змінні середовища хосту, а не хардкодяться в цьому файлі. Раніше пароль
# Postgres лежав прямим текстом і в POSTGRES_PASSWORD, і в DB_URL — якщо
# цей файл коли-небудь потрапляв у git (окремо від .gitignore, який був
# зламаний — див. .gitignore), пароль БД опинявся в історії репозиторію.
# Перед першим запуском додайте у ваш .env:
#   POSTGRES_USER=ev_admin
#   POSTGRES_PASSWORD=<згенеруйте новий надійний пароль>
#   POSTGRES_DB=ev_charge_base

services:
  bot:
    build: .
    container_name: ev-charge-bot-bot-1
    restart: always
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - DB_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - .:/app
    ports:
      - "8000:8000"

  redis:
    image: redis:7-alpine
    container_name: ev-charge-bot-redis-1
    restart: always
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    container_name: ev-charge-bot-postgres-1
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
