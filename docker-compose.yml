
# ВАЖЛИВО: усі секрети (паролі, токени) тепер задаються лише через .env і
# змінні середовища хосту, а не хардкодяться в цьому файлі. Раніше пароль
# Postgres лежав прямим текстом і в POSTGRES_PASSWORD, і в DB_URL — якщо
# цей файл коли-небудь потрапляв у git (окремо від .gitignore, який був
# зламаний — див. .gitignore), пароль БД опинявся в історії репозиторію.
# Перед першим запуском додайте у ваш .env:
#   POSTGRES_USER=ev_admin
#   POSTGRES_PASSWORD=<згенеруйте новий надійний пароль>
#   POSTGRES_DB=ev_charge_base

services:
  bot:
    build: .
    container_name: ev-charge-bot-bot-1
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - DB_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      # Без curl в образі (python:3.11-slim) — перевіряємо стдлібним urllib,
      # щоб не тягнути зайвий пакет лише заради healthcheck.
      test: ["CMD", "python", "-c", "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: ev-charge-bot-redis-1
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: ev-charge-bot-postgres-1
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
